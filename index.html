<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnicería Camacho</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Montserrat",sans-serif;
  background:#f4f4f4;
  color:#222;
}

.login-box{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.login-card{
  background:white;
  padding:30px;
  border-radius:18px;
  width:330px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.login-card h2{
  color:#7a0000;
  margin-top:0;
}

.login-card input{
  width:100%;
  margin-bottom:12px;
}

.user-bar{
  background:#fff;
  padding:12px 20px;
  text-align:center;
  font-weight:700;
  color:#7a0000;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

header{
  background:#6b0000;
  color:white;
  padding:22px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:38px;
}

.hero{
  background:
  linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
  url("IMG_2475(1).jpeg");
  background-size:cover;
  background-position:center;
  height:520px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h2{
  font-size:56px;
  margin:0 0 12px;
  text-shadow:0 4px 12px rgba(0,0,0,.6);
}

.hero p{
  font-size:22px;
  margin:0;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:35px 20px;
}

.section-title{
  font-size:30px;
  color:#7a0000;
  margin-top:45px;
}

.form-box{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  margin-bottom:25px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

input{
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  font-family:"Montserrat",sans-serif;
}

button{
  border:none;
  background:#8b0000;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  margin-top:8px;
}

button:hover{
  background:#5c0000;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(245px,1fr));
  gap:22px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:18px;
  text-align:center;
}

.card h3{
  color:#7a0000;
}

.price{
  color:green;
  font-size:24px;
  font-weight:800;
}

.card button{
  width:100%;
}

.editar{
  background:#333;
}

.eliminar{
  background:#d62828;
}

.lista{
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
}

.admin-only{
  display:none;
}

@media(max-width:768px){
  header h1{font-size:28px}
  .hero{height:360px}
  .hero h2{font-size:34px}
}
</style>
</head>

<body>

<div id="loginBox" class="login-box">
  <div class="login-card">
    <h2>Acceso al sistema</h2>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<header>
  <h1>🥩 Carnicería Camacho</h1>
</header>

<div class="user-bar">
  <span id="rolTexto">Sin iniciar sesión</span>
  <button onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<section class="hero">
  <div>
    <h2>Productos frescos todos los días</h2>
    <p>Calidad premium para tu familia.</p>
  </div>
</section>

<div class="container">

<h2 class="section-title">Productos</h2>
<div class="form-box admin-only">
  <div class="form-grid">
    <input id="productoDescripcion" placeholder="Nombre del producto">
    <input id="productoCosto" type="number" placeholder="Costo">
    <input id="productoImagen" placeholder="Link de imagen">
    <input id="productoProveedor" type="number" placeholder="ID proveedor">
  </div>
  <button onclick="agregarProducto()">Guardar Producto</button>
</div>
<div id="productos" class="grid"></div>

<h2 class="section-title">Clientes</h2>
<div class="form-box admin-only">
  <div class="form-grid">
    <input id="clienteNombre" placeholder="Nombre">
    <input id="clienteTelefono" placeholder="Teléfono">
    <input id="clienteDireccion" placeholder="Dirección">
  </div>
  <button onclick="agregarCliente()">Guardar Cliente</button>
</div>
<div id="clientes" class="lista"></div>

<h2 class="section-title">Proveedores</h2>
<div class="form-box admin-only">
  <div class="form-grid">
    <input id="proveedorDescripcion" placeholder="Proveedor">
    <input id="proveedorTipo" placeholder="Tipo">
  </div>
  <button onclick="agregarProveedor()">Guardar Proveedor</button>
</div>
<div id="proveedores" class="lista"></div>

<h2 class="section-title">Ventas</h2>
<div class="form-box admin-only">
  <div class="form-grid">
    <input id="ventaFecha" type="date">
    <input id="ventaNumero" placeholder="Número de venta">
    <input id="ventaCliente" type="number" placeholder="ID cliente">
    <input id="ventaSubtotal" type="number" placeholder="Subtotal">
  </div>
  <button onclick="agregarVenta()">Guardar Venta</button>
</div>
<div id="ventas" class="lista"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
